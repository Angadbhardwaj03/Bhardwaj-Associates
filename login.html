<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Bhardwaj & Associates</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--off-white);
        }

        .login-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            border-top: 4px solid var(--deep-crimson);
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <h2 style="color: var(--navy-blue); margin-bottom: 0.5rem; font-family: var(--font-heading);">Admin Portal
            </h2>
            <p style="color: var(--slate-grey); margin-bottom: 2rem;">Bhardwaj & Associates</p>

            <form id="loginForm" method="POST" action="/login">
                <div class="form-group" style="text-align: left;">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter admin username">
                </div>
                <div class="form-group" style="text-align: left;">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Access
                    Dashboard</button>
            </form>
            <p style="margin-top: 1.5rem; font-size: 0.9rem;"><a href="/">← Back to Public Website</a></p>
        </div>
    </div>
</body>

</html>
